<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>cartoes responsivos - tailwind</title>
</head>
<body class="bg-gray-100 p-6">
    <section class="mx-auto max-w-6x1"></section>
    <h1 class="text-blue font-bold mb-6">Cards Responsivos</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
         <article class="bg-white p-6 shadow">
            <h2 class="text-lg font-bold mb-2">Bolos</h2>
            <p class="text-base text-red-900">Deliciosos, feitos com produtos selecionadoes e orgânicos</p>
        </article>
        <article class="bg-white p-6 shadow">
            <h2 class="text-lg font-bold mb-2">Salgados</h2>
            <p class="text-base text-red-900">Deliciosos, feitos com produtos selecionadoes e orgânicos</p>
        </article>
        <article class="bg-white p-6 shadow">
            <h2 class="text-lg font-bold mb-2">Doces</h2>
            <p class="text-base text-red-900">Deliciosos, feitos com produtos selecionadoes e orgânicos</p>
        </article>
    </div>

</body>
</html>
